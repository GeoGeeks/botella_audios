<!DOCTYPE html>
<html>
<head>
  <!-- Cargar fuente Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body style="margin:0; padding:0; background:transparent;">
  <div id="fecha" 
       style="font-size:22px; font-weight:bold; color:#003b56; 
              padding:10px; text-align:center; font-family:'Montserrat', sans-serif;">
  </div>

  <script>
    function actualizarFecha() {
        const hoy = new Date();
        const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('fecha').innerText = hoy.toLocaleDateString('es-ES', opciones);
    }
    actualizarFecha();
  </script>
</body>
</html>
